// ── Simple CSV parser ────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.replace(/"/g,'').trim());
  return lines.slice(1).map(line => {
    const values = line.split(',').map(v => v.replace(/"/g,'').trim());
    return headers.reduce((obj, h, i) => { obj[h] = values[i] || ''; return obj; }, {});
  }).filter(row => Object.values(row).some(v => v));
}

function App() {
  const [mode, setMode]             = useState('overview');
  const [selectedGroup, setGroup]   = useState('A');
  const [selectedCity, setCity]     = useState('Atlanta');
  const [maxPrice, setMaxPrice]     = useState(800);
  const [uploadStatus, setStatus]   = useState(null);
  const [liveData, setLiveData]     = useState({});
  const [sort, setSort]             = useState({ key:'match', dir:'asc' });

  // Merge uploaded CSV data over embedded data
  const events = useMemo(() => {
    return RAW_EVENTS.map(e => ({ ...e, ...(liveData[e.match] || {}) }));
  }, [liveData]);

  const filtered = useMemo(() => {
    let rows = events;
    if (mode === 'team')    rows = rows.filter(e => e.group === selectedGroup);
    if (mode === 'venue')   rows = rows.filter(e => e.city  === selectedCity);
    if (mode === 'price')   rows = rows.filter(e => e.p50   <= maxPrice);
    return [...rows].sort((a, b) => {
      const av = a[sort.key], bv = b[sort.key];
      return sort.dir === 'asc' ? (av < bv ? -1 : av > bv ? 1 : 0) : (av > bv ? -1 : av < bv ? 1 : 0);
    });
  }, [events, mode, selectedGroup, selectedCity, maxPrice, sort]);

  const stats = useMemo(() => {
    let totalQty=0, soldQty=0, totalCost=0, floorValue=0;
    Object.entries(INVENTORY).forEach(([id, inv]) => {
      totalQty  += inv.qty;
      soldQty   += inv.sold;
      totalCost += inv.cost;
    });
    filtered.forEach(e => {
      const inv = INVENTORY[e.match];
      if (inv) floorValue += (inv.qty - inv.sold) * e.p25;
    });
    return { totalQty, soldQty, unsold: totalQty - soldQty, totalCost, floorValue };
  }, [filtered]);

  const handleSort = key => setSort(s => ({ key, dir: s.key === key && s.dir === 'asc' ? 'desc' : 'asc' }));
  const sortArrow  = key => sort.key === key ? (sort.dir === 'asc' ? ' ↑' : ' ↓') : ' ↕';

  const handleUpload = useCallback(e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = evt => {
      const rows = parseCSV(evt.target.result);
      if (!rows.length) return;
      const sample = rows[0];
      const merged = {};
      if ('Price Min' in sample) {
        // Discovery CSV
        rows.forEach(r => {
          const id = parseInt(r['Match #']);
          if (id) merged[id] = {
            pMin: parseFloat(r['Price Min']) || undefined,
            p25:  parseFloat(r['Price P25']) || undefined,
            p50:  parseFloat(r['Price P50']) || undefined,
            ticketQty: parseInt(r['Ticket Qty']) || undefined,
            visits7d: parseInt(r['Visits L7D']) || undefined,
            trans7d:  parseInt(r['Trans L7D'])  || undefined,
          };
        });
        setStatus(`✓ Discovery CSV loaded (${rows.length} rows) — prices updated`);
      } else if ('Total Qty' in sample) {
        // Inventory CSV — just show status; embedded INVENTORY used for now
        setStatus(`✓ Inventory CSV loaded (${rows.length} rows)`);
      } else if ('Unit Cost' in sample) {
        setStatus(`✓ Event-by-Event CSV loaded (${rows.length} rows)`);
      } else {
        setStatus(`✓ CSV loaded (${rows.length} rows) — unknown type`);
      }
      setLiveData(prev => ({ ...prev, ...merged }));
    };
    reader.readAsText(file);
    e.target.value = '';
  }, []);

  const modes = [
    { id:'overview', label:'Portfolio Overview', icon:'📊' },
    { id:'team',     label:'Team Path Tracker',  icon:'⚽' },
    { id:'venue',    label:'Venue Scout',         icon:'📍' },
    { id:'price',    label:'Price Hunter',        icon:'💰' },
  ];

  return (
    <div style={{ minHeight:'100vh', padding:'1.5rem', maxWidth:'1400px', margin:'0 auto' }}>

      {/* Header */}
      <div style={{ marginBottom:'2rem' }}>
        <h1 className="gradient-text" style={{ fontSize:'2.5rem', fontWeight:'800', marginBottom:'0.25rem' }}>
          FIFA 2026 Sales Hub
        </h1>
        <p style={{ color:'#94a3b8' }}>Real-time ticket market intelligence &amp; portfolio management</p>
      </div>

      {/* Mode Buttons */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:'0.75rem', marginBottom:'1.5rem' }}>
        {modes.map(m => (
          <button key={m.id} onClick={() => setMode(m.id)}
            className={mode === m.id ? 'btn-active' : 'btn-inactive'}
            style={{ padding:'1rem', borderRadius:'0.5rem', fontWeight:'600', cursor:'pointer', display:'flex', alignItems:'center', gap:'0.5rem' }}>
            <span>{m.icon}</span>{m.label}
          </button>
        ))}
      </div>

      {/* Control Panel */}
      {mode === 'team' && (
        <div className="card" style={{ padding:'1rem', marginBottom:'1.5rem' }}>
          <label style={{ display:'block', color:'#94a3b8', fontSize:'0.875rem', marginBottom:'0.5rem' }}>Select Group</label>
          <select value={selectedGroup} onChange={e => setGroup(e.target.value)}>
            {Object.keys(GROUPS).map(g => (
              <option key={g} value={g}>Group {g} — {GROUPS[g].join(', ')}</option>
            ))}
          </select>
        </div>
      )}
      {mode === 'venue' && (
        <div className="card" style={{ padding:'1rem', marginBottom:'1.5rem' }}>
          <label style={{ display:'block', color:'#94a3b8', fontSize:'0.875rem', marginBottom:'0.5rem' }}>Select City</label>
          <select value={selectedCity} onChange={e => setCity(e.target.value)}>
            {CITIES.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
        </div>
      )}
      {mode === 'price' && (
        <div className="card" style={{ padding:'1rem', marginBottom:'1.5rem' }}>
          <label style={{ display:'block', color:'#94a3b8', fontSize:'0.875rem', marginBottom:'0.75rem' }}>
            Max Price (P50 Median): <strong style={{ color:'#22d3ee' }}>${maxPrice}</strong>
          </label>
          <input type="range" min="0" max="800" step="25" value={maxPrice} onChange={e => setMaxPrice(+e.target.value)} />
          <div style={{ display:'flex', justifyContent:'space-between', fontSize:'0.75rem', color:'#64748b', marginTop:'0.25rem' }}>
            <span>$0</span><span>$400</span><span>$800</span>
          </div>
        </div>
      )}

      {/* Upload + Stats Row */}
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr 1fr 2fr', gap:'1rem', marginBottom:'1.5rem' }}>
        <div className="card" style={{ padding:'1rem', textAlign:'center' }}>
          <div style={{ color:'#94a3b8', fontSize:'0.75rem', marginBottom:'0.25rem' }}>Total Tickets</div>
          <div style={{ fontSize:'1.75rem', fontWeight:'700', color:'#22d3ee' }}>{stats.totalQty.toLocaleString()}</div>
        </div>
        <div className="card" style={{ padding:'1rem', textAlign:'center' }}>
          <div style={{ color:'#94a3b8', fontSize:'0.75rem', marginBottom:'0.25rem' }}>Sold</div>
          <div style={{ fontSize:'1.75rem', fontWeight:'700', color:'#4ade80' }}>{stats.soldQty.toLocaleString()}</div>
        </div>
        <div className="card" style={{ padding:'1rem', textAlign:'center' }}>
          <div style={{ color:'#94a3b8', fontSize:'0.75rem', marginBottom:'0.25rem' }}>Unsold</div>
          <div style={{ fontSize:'1.75rem', fontWeight:'700', color:'#f59e0b' }}>{stats.unsold.toLocaleString()}</div>
        </div>
        <div className="card" style={{ padding:'1rem', textAlign:'center' }}>
          <div style={{ color:'#94a3b8', fontSize:'0.75rem', marginBottom:'0.25rem' }}>Floor Value (P25)</div>
          <div style={{ fontSize:'1.75rem', fontWeight:'700', color:'#818cf8' }}>${stats.floorValue.toLocaleString()}</div>
        </div>
        <div className="card" style={{ padding:'1rem' }}>
          <label style={{ display:'flex', alignItems:'center', gap:'0.5rem', cursor:'pointer', color:'#94a3b8', fontSize:'0.875rem' }}>
            <span>📤</span>
            <span>Upload CSV (Discovery / Inventory / Event-by-Event)</span>
            <input type="file" accept=".csv" onChange={handleUpload} style={{ display:'none' }} />
          </label>
          {uploadStatus && (
            <div style={{ marginTop:'0.5rem', fontSize:'0.75rem', color:'#4ade80' }}>{uploadStatus}</div>
          )}
        </div>
      </div>

      {/* Data Table */}
      <div className="card" style={{ overflowX:'auto' }}>
        <table style={{ width:'100%', fontSize:'0.875rem', borderCollapse:'collapse' }}>
          <thead>
            <tr style={{ background:'rgba(30,41,59,0.8)', borderBottom:'1px solid #334155' }}>
              {[
                {key:'match',   label:'#'},
                {key:'event',   label:'Match'},
                {key:'group',   label:'Grp'},
                {key:'date',    label:'Date'},
                {key:'city',    label:'City'},
                {key:'pMin',    label:'Floor'},
                {key:'p25',     label:'P25'},
                {key:'p50',     label:'P50 Median'},
                {key:'ticketQty',label:'Listing Qty'},
                {key:'trans7d', label:'Trans 7D'},
                {key:'held',    label:'Held'},
                {key:'sold',    label:'Sold'},
                {key:'sentiment',label:'Sentiment'},
              ].map(col => (
                <th key={col.key} onClick={() => handleSort(col.key)}
                  style={{ padding:'0.75rem 1rem', textAlign:'left', color:'#22d3ee', fontWeight:'600', whiteSpace:'nowrap', userSelect:'none' }}>
                  {col.label}{sortArrow(col.key)}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map(event => {
              const inv  = INVENTORY[event.match];
              const held = inv ? inv.qty - inv.sold : 0;
              const teams = event.event.split(' vs ');
              const sentiment = Math.max(SENTIMENT[teams[0]] || 0, SENTIMENT[teams[1]] || 0);
              const sentimentColor = sentiment >= 9 ? '#4ade80' : sentiment >= 7 ? '#f59e0b' : sentiment >= 5 ? '#94a3b8' : '#64748b';
              return (
                <tr key={event.match} style={{ borderBottom:'1px solid rgba(51,65,85,0.5)' }}>
                  <td style={{ padding:'0.75rem 1rem', color:'#22d3ee', fontWeight:'600' }}>#{event.match}</td>
                  <td style={{ padding:'0.75rem 1rem', whiteSpace:'nowrap' }}>{event.event}</td>
                  <td style={{ padding:'0.75rem 1rem', color:'#94a3b8', textAlign:'center' }}>{event.group}</td>
                  <td style={{ padding:'0.75rem 1rem', color:'#94a3b8', whiteSpace:'nowrap' }}>{event.date}</td>
                  <td style={{ padding:'0.75rem 1rem', whiteSpace:'nowrap' }}>{event.city}</td>
                  <td style={{ padding:'0.75rem 1rem', color:'#4ade80' }}>${event.pMin}</td>
                  <td style={{ padding:'0.75rem 1rem', color:'#60a5fa' }}>${event.p25}</td>
                  <td style={{ padding:'0.75rem 1rem', color:'#f59e0b', fontWeight:'700' }}>${event.p50}</td>
                  <td style={{ padding:'0.75rem 1rem', color:'#94a3b8', textAlign:'right' }}>{event.ticketQty?.toLocaleString()}</td>
                  <td style={{ padding:'0.75rem 1rem', color:'#94a3b8', textAlign:'right' }}>{event.trans7d}</td>
                  <td style={{ padding:'0.75rem 1rem', color:'#22d3ee', textAlign:'right', fontWeight:'600' }}>{inv ? held : '—'}</td>
                  <td style={{ padding:'0.75rem 1rem', color:'#4ade80', textAlign:'right' }}>{inv ? inv.sold : '—'}</td>
                  <td style={{ padding:'0.75rem 1rem', textAlign:'center' }}>
                    <span style={{ color: sentimentColor, fontWeight:'700' }}>{'★'.repeat(Math.round(sentiment/2))}</span>
                    <span style={{ color:'#475569' }}>{'★'.repeat(5 - Math.round(sentiment/2))}</span>
                    <span style={{ color: sentimentColor, fontSize:'0.75rem', marginLeft:'0.25rem' }}>{sentiment}/10</span>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
        <div style={{ padding:'0.75rem 1rem', color:'#64748b', fontSize:'0.75rem', borderTop:'1px solid #334155' }}>
          Showing {filtered.length} of {RAW_EVENTS.length} matches · Pricing as of 3/10/2026
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
