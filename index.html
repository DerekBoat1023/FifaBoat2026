  const t2 = parts[1].trim();
  const s1 = SENTIMENTS[t1] || 0;
  const s2 = SENTIMENTS[t2] || 0;
  return Math.max(s1, s2);
}

function formatCurrency(n) {
  return '$' + Number(n).toLocaleString('en-US', {maximumFractionDigits:0});
}

function formatCurrencyDecimal(n, decimals = 0) {
  return '$' + Number(n).toLocaleString('en-US', {maximumFractionDigits:decimals});
}

function getSentimentClass(score) {
  if (score >= 9) return 'sentiment-9-10';
  if (score >= 7) return 'sentiment-7-8';
  if (score >= 5) return 'sentiment-5-6';
  return 'sentiment-lt5';
}

function getStateFromLocation(location) {
  const parts = location.split(',');
  if (parts.length >= 2) return parts[1].trim();
  return parts[0].trim();
}

// Simple Bar Chart Component
function BarChart({data, valueKey, color, height, dateKey}) {
  if (!data || data.length === 0) return <div>No data</div>;
  const maxVal = Math.max(...data.map(d => d[valueKey] || 0), 1);
  return (
    <div className="bar-chart-container" style={{height}}>
      {data.map((d, i) => {
        const pct = maxVal > 0 ? (d[valueKey] / maxVal * 100) : 0;
        const dateStr = d.date ? d.date.slice(5) : '';
        return (
          <div key={i} className="bar-chart-bar">
            <div title={valueKey + ': ' + d[valueKey]} style={{width:'100%', height: pct + '%', background: color, borderRadius:'2px 2px 0 0', minHeight: pct > 0 ? '2px' : '0'}}></div>
            <div className="bar-chart-label">{dateStr}</div>
          </div>
        );
      })}
    </div>
  );
}

// Tab 1: All Events
function AllEventsTab() {
  const [sortKey, setSortKey] = useState('match');
  const [sortAsc, setSortAsc] = useState(true);

  const sortedEvents = useMemo(() => {
    const copy = EVENTS.map((e, i) => {
      const latest = getLatestPrice(e.match);
      const sentiment = getSentiment(e.name);
      let trendChar = '—';
      let trendColor = '#94a3b8';
      if (PRICES[String(e.match)] && PRICES[String(e.match)].length >= 2) {
        const latest = PRICES[String(e.match)][PRICES[String(e.match)].length - 1];
        const prev = PRICES[String(e.match)][PRICES[String(e.match)].length - 2];
        if (latest.p50 > prev.p50) {
          trendChar = '↑';
          trendColor = '#4ade80';
        } else if (latest.p50 < prev.p50) {
          trendChar = '↓';
          trendColor = '#ff6b6b';
        }
      }
      return {
        ...e,
        latest,
        sentiment,
        trendChar,
        trendColor,
        p50: latest ? latest.p50 : null,
        p25: latest ? latest.p25 : null,
        floor: latest ? latest.pMin : null,
        visits: latest ? latest.v7d : null,
        trans: latest ? latest.t7 : null
      };
    });
    copy.sort((a, b) => {
      let aVal = a[sortKey];
      let bVal = b[sortKey];
      if (typeof aVal === 'string') {
        aVal = aVal.toLowerCase();
        bVal = bVal.toLowerCase();
      }
      return sortAsc ? (aVal > bVal ? 1 : -1) : (aVal > bVal ? -1 : 1);
    });
    return copy;
  }, [sortKey, sortAsc]);

  const handleSort = (key) => {
    if (sortKey === key) {
      setSortAsc(!sortAsc);
    } else {
      setSortKey(key);
      setSortAsc(true);
    }
  };

  return (
    <div>
      <div className="overflow-x-auto">
        <table className="w-full text-xs">
          <thead className="table-sticky">
            <tr>
              <th className="text-left p-2 cursor-pointer" onClick={() => handleSort('match')}>#</th>
              <th className="text-left p-2 cursor-pointer" onClick={() => handleSort('name')}>Event</th>
              <th className="text-left p-2 cursor-pointer" onClick={() => handleSort('venue')}>Venue</th>
              <th className="text-left p-2 cursor-pointer" onClick={() => handleSort('date')}>Date</th>
              <th className="text-right p-2 cursor-pointer" onClick={() => handleSort('floor')}>Floor</th>
              <th className="text-right p-2 cursor-pointer" onClick={() => handleSort('p25')}>P25</th>
              <th className="text-right p-2 cursor-pointer" onClick={() => handleSort('p50')}>P50</th>
              <th className="text-right p-2">SH Qty</th>
              <th className="text-right p-2">V7D</th>
              <th className="text-right p-2">T7</th>
              <th className="text-center p-2">Trend</th>
              <th className="text-center p-2">Sentiment</th>
              <th className="text-center p-2">Links</th>
            </tr>
          </thead>
          <tbody>
            {sortedEvents.map((e, i) => (
              <tr key={i} className="hover:bg-slate-700 border-b border-slate-600">
                <td className="p-2">{e.match}</td>

// Tab 5: Hot Picks
function HotPicksTab() {
  const hotPicks = useMemo(() => {
    const picks = EVENTS.map(e => {
      const latest = getLatestPrice(e.match);
      if (!latest) return null;
      const sentiment = getSentiment(e.name);
      const avgV7D = EVENTS.reduce((sum, ev) => {
        const lat = getLatestPrice(ev.match);
        return sum + (lat ? lat.v7d : 0);
      }, 0) / EVENTS.length;
      const spread = latest.p50 - latest.pMin;
      const score = (sentiment / 10) * (latest.v7d / Math.max(avgV7D, 1)) * (spread / Math.max(latest.pMin, 1));
      return {
        ...e,
        sentiment,
        p50: latest.p50,
        pMin: latest.pMin,
        v7d: latest.v7d,
        spreadPct: (spread / Math.max(latest.pMin, 1) * 100).toFixed(1),
        score
      };
    }).filter(x => x).sort((a, b) => b.score - a.score).slice(0, 20).map((x, i) => ({...x, rank: i + 1}));
    return picks;
  }, []);

  return (
    <div className="card-bg p-4 rounded">
      <div className="overflow-x-auto">
        <table className="w-full text-xs">
          <thead className="table-sticky">
            <tr>
              <th className="text-center p-2">Rank</th>

              <th className="text-right p-2">Floor</th>
              <th className="text-right p-2">Spread%</th>
              <th className="text-right p-2">V7D</th>
              <th className="text-right p-2">Score</th>
              <th className="text-center p-2">Links</th>

                <td className="p-2">{p.match}</td>
                <td className="p-2">{p.name}</td>
                <td className={`text-center p-2 ${getSentimentClass(p.sentiment)}`}>{p.sentiment}</td>
                <td className="text-right p-2">{formatCurrency(p.p50)}</td>

      <div className="grid grid-cols-3 gap-3 mb-6">

        <div className="card-bg p-4 rounded">

          <div className="text-xl font-bold">{formatCurrency(stats.avgP50)}</div>
        </div>
        <div className="card-bg p-4 rounded">
          <div className="text-xs text-gray-400">Avg Sentiment</div>
          <div className={`text-xl font-bold ${getSentimentClass(stats.avgSentiment)}`}>{stats.avgSentiment.toFixed(1)}</div>

      <div className="card-bg p-4 rounded">
        <div className="overflow-x-auto">
          <table className="w-full text-xs">
            <thead className="table-sticky">
              <tr>
                <th className="text-left p-2">#</th>
                <th className="text-left p-2">Event</th>
                <th className="text-left p-2">Venue</th>
                <th className="text-left p-2">Date</th>
                <th className="text-right p-2">P50</th>
                <th className="text-center p-2">Sentiment</th>

}

// Tab 7: Price Hunter
function PriceHunterTab() {
  const [maxPrice, setMaxPrice] = useState(5000);

  const filtered = useMemo(() => {
    return EVENTS.filter(e => {
      const latest = getLatestPrice(e.match);
      return latest && latest.p50 <= maxPrice;
    }).map(e => {
      const latest = getLatestPrice(e.match);
      const sentiment = getSentiment(e.name);
      const spreadPct = ((latest.p50 - latest.pMin) / Math.max(latest.pMin, 1) * 100).toFixed(1);
      return {
        ...e,
        latest,
        sentiment,
        p50: latest.p50,
        pMin: latest.pMin,
        spreadPct
      };
    }).sort((a, b) => parseFloat(b.spreadPct) - parseFloat(a.spreadPct));
  }, [maxPrice]);

  return (
    <div>
      <div className="mb-6 card-bg p-4 rounded">
        <label className="mr-4 text-sm">Max P50: ${maxPrice.toLocaleString()}</label>
        <input type="range" min="500" max="20000" step="100" value={maxPrice} onChange={(e) => setMaxPrice(parseInt(e.target.value))} className="w-full mt-2" />
      </div>

      <div className="card-bg p-4 rounded">
        <div className="overflow-x-auto">
          <table className="w-full text-xs">
            <thead className="table-sticky">
              <tr>
                <th className="text-left p-2">#</th>
                <th className="text-left p-2">Event</th>
                <th className="text-left p-2">Venue</th>
                <th className="text-left p-2">Date</th>
                <th className="text-right p-2">Floor</th>
                <th className="text-right p-2">P50</th>
                <th className="text-right p-2">Spread%</th>
                <th className="text-center p-2">Sentiment</th>
                <th className="text-center p-2">Links</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map((e, i) => (
                <tr key={i} className="hover:bg-slate-700 border-b border-slate-600">
                  <td className="p-2">{e.match}</td>
                  <td className="p-2">{e.name}</td>
                  <td className="p-2">{e.venue}</td>
                  <td className="p-2">{e.date}</td>
                  <td className="text-right p-2">{formatCurrency(e.pMin)}</td>
                  <td className="text-right p-2">{formatCurrency(e.p50)}</td>
                  <td className="text-right p-2">{e.spreadPct}%</td>
                  <td className={`text-center p-2 ${getSentimentClass(e.sentiment)}`}>{e.sentiment}</td>
                  <td className="text-center p-2">
                    <a href={e.pos} target="_blank" rel="noopener noreferrer" className="pill" style={{background:'#1e40af',color:'#93c5fd'}}>POS</a>
                    <a href={e.gotix} target="_blank" rel="noopener noreferrer" className="pill" style={{background:'#1e3a1f',color:'#86efac'}}>GoTix</a>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// Main App
function App() {
  const [activeTab, setActiveTab] = useState(0);

  const tabs = [
    {label: 'All Events', component: AllEventsTab},
    {label: 'Team Path Tracker', component: TeamPathTab},
    {label: 'Market Trends', component: MarketTrendsTab},
    {label: 'Portfolio / P&L', component: PortfolioTab},
    {label: 'Hot Picks', component: HotPicksTab},
    {label: 'Venue Scout', component: VenueScoutTab},
    {label: 'Price Hunter', component: PriceHunterTab}
  ];

  const CurrentTab = tabs[activeTab].component;

  return (
    <div className="min-h-screen p-6">
      <h1 className="text-4xl font-bold mb-6 grad-title">FIFA Boat 2026</h1>

      <div className="flex gap-2 mb-6 border-b border-slate-600 overflow-x-auto">
        {tabs.map((tab, i) => (
          <button
            key={i}
            onClick={() => setActiveTab(i)}
            className={`px-4 py-2 rounded-t whitespace-nowrap text-sm font-semibold ${activeTab === i ? 'tab-active' : 'tab-inactive'}`}
          >
            {tab.label}
          </button>
        ))}
      </div>

      <div className="card-bg p-6 rounded">
        <CurrentTab />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
