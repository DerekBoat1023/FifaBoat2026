body{font-family:system-ui,-apple-system,sans-serif;background:#f1f5f9;color:#1e293b;font-size:14px}
#header{background:#1e3a5f;color:white;padding:14px 24px;display:flex;align-items:center;gap:12px}

#header .sub{font-size:0.7rem;color:#93c5fd;margin-top:2px}

.tab-btn{padding:11px 14px;font-size:0.75rem;font-weight:700;color:#64748b;border:none;background:none;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;margin-bottom:-2px;transition:color .15s}
.tab-btn:hover{color:#1e40af}
.tab-btn.active{color:#1e40af;border-bottom-color:#1e40af}
#content{padding:18px 22px;max-width:1400px;margin:0 auto}
.tab-panel{display:none}
.tab-panel.active{display:block}
.card{background:white;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden}
.card-pad{padding:16px}
.filter-bar{background:white;border:1px solid #e2e8f0;border-radius:8px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.filter-label{font-size:0.75rem;font-weight:700;color:#475569}
.filter-input{border:1px solid #e2e8f0;border-radius:6px;padding:5px 9px;font-size:0.78rem;color:#334155;background:white}
.filter-input:focus{outline:none;border-color:#3b82f6}
.filter-count{font-size:0.72rem;color:#94a3b8}
table{width:100%;border-collapse:collapse}
th{padding:9px 11px;font-size:0.68rem;font-weight:700;color:#475569;background:#f8fafc;text-transform:uppercase;letter-spacing:.04em;border-bottom:2px solid #e2e8f0;white-space:nowrap;text-align:left}
th.r{text-align:right}
th.c{text-align:center}
th.sortable{cursor:pointer;user-select:none}
th.sortable:hover{background:#eff6ff;color:#1e40af}
th.sort-active{color:#1e40af}
td{padding:8px 11px;font-size:0.78rem;border-bottom:1px solid #f1f5f9;color:#334155}
td.r{text-align:right}
td.c{text-align:center}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8fafc}
.up{color:#16a34a;font-weight:600}
.down{color:#dc2626;font-weight:600}
.flat{color:#94a3b8}
.bold{font-weight:700;color:#1e293b}
.muted{color:#94a3b8}
.badge{display:inline-block;padding:2px 7px;border-radius:999px;font-size:.65rem;font-weight:700;text-decoration:none;white-space:nowrap}
.badge-pos{background:#dbeafe;color:#1d4ed8}
.badge-pos:hover{background:#bfdbfe}
.badge-gtx{background:#dcfce7;color:#15803d}
.badge-gtx:hover{background:#bbf7d0}
.sent-hi{color:#16a34a;font-weight:700}
.sent-md{color:#d97706;font-weight:600}
.sent-lo{color:#94a3b8}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.stat{background:white;border:1px solid #e2e8f0;border-radius:8px;padding:14px}
.stat-lbl{font-size:.67rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.04em}
.stat-val{font-size:1.35rem;font-weight:800;color:#1e293b;margin-top:3px}
.stat-sub{font-size:.67rem;color:#94a3b8;margin-top:2px}
.stat.green{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border-color:#86efac}
.stat.red{background:linear-gradient(135deg,#fef2f2,#fee2e2);border-color:#fca5a5}
.stat.blue{background:linear-gradient(135deg,#eff6ff,#dbeafe);border-color:#93c5fd}
.stat.amber{background:linear-gradient(135deg,#fffbeb,#fef3c7);border-color:#fde68a}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:768px){.two-col{grid-template-columns:1fr}}
.insight{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:12px 16px;font-size:.78rem;color:#92400e;margin-top:14px}
.insight strong{font-weight:700}
.view-btns{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.view-btn{padding:6px 13px;border-radius:6px;font-size:.76rem;font-weight:700;cursor:pointer;border:1px solid #e2e8f0;background:white;color:#475569;transition:all .15s}

.view-btn.active{background:#1e40af;color:white;border-color:#1e40af}

.path-btn.active{background:#1e40af;color:white}
.section-title{font-size:.82rem;font-weight:700;color:#1e293b;margin-bottom:10px}

.r2{background:#f1f5f9;color:#475569}

.pill-tag{display:inline-block;background:#f1f5f9;color:#475569;border-radius:4px;padding:2px 7px;font-size:.68rem;font-weight:700}
input[type=range]{width:100%;cursor:pointer;accent-color:#1e40af}
.range-val{font-size:.9rem;font-weight:800;color:#1e40af;min-width:80px}
</style>
</head>

    <div class="sub">World Cup Ticket Market Intelligence</div>
  </div>

  <button class="tab-btn" onclick="showTab(2)">&#128200; Market Trends</button>

<div id="content">

<!-- TAB 0: All Events -->
<div class="tab-panel active" id="tab-0">

  </div>

</div>

<!-- TAB 1: Team Paths -->
<div class="tab-panel" id="tab-1">
  <div class="filter-bar">
    <span class="filter-label">Team:</span>
    <select class="filter-input" id="team-select" onchange="renderTeamPaths()"></select>
    <span class="pill-tag" id="team-group"></span>
  </div>
  <div class="path-btns" id="path-btns"></div>
  <div class="card overflow" id="team-paths-card"><table id="paths-table"><thead id="paths-head"></thead><tbody id="paths-body"></tbody></table></div>
</div>

<!-- TAB 2: Market Trends -->
<div class="tab-panel" id="tab-2">
  <div class="view-btns">
    <button class="view-btn active" onclick="showTrendsView('overview',this)">Market Overview</button>
    <button class="view-btn" onclick="showTrendsView('movers',this)">All Movers</button>
    <button class="view-btn" onclick="showTrendsView('deepdive',this)">Match Deep Dive</button>
  </div>
  <div id="trends-overview"></div>
  <div id="trends-movers" style="display:none"></div>
  <div id="trends-deepdive" style="display:none">
    <div class="filter-bar">
      <span class="filter-label">Match:</span>
      <select class="filter-input" id="deepdive-select" onchange="renderDeepDive()" style="width:360px"></select>
    </div>
    <div id="deepdive-content"></div>
  </div>
</div>

<!-- TAB 3: Portfolio -->
<div class="tab-panel" id="tab-3">
  <div id="portfolio-stats" class="stat-grid"></div>
  <div class="view-btns">
    <button class="view-btn active" onclick="showPortView('summary',this)">Event Summary</button>
    <button class="view-btn" onclick="showPortView('sales',this)">All Transactions</button>
  </div>
  <div id="port-summary"></div>
  <div id="port-sales" style="display:none"></div>
</div>

<!-- TAB 4: Hot Picks -->
<div class="tab-panel" id="tab-4">
  <div class="insight"><strong>Score formula:</strong> Sentiment &times; (V7D / Avg V7D) &times; (Spread% + 0.5). Higher = stronger demand + margin potential. Click any column to sort.</div>
  <div class="card overflow mt"><table id="picks-table"><thead id="picks-head"></thead><tbody id="picks-body"></tbody></table></div>
</div>

<!-- TAB 5: Venue Scout -->
<div class="tab-panel" id="tab-5">
  <div class="filter-bar">
    <span class="filter-label">State / Province:</span>
    <select class="filter-input" id="venue-select" onchange="renderVenueScout()"></select>
  </div>
  <div class="stat-grid" id="venue-stats"></div>
  <div class="card overflow"><table id="venue-table"><thead id="venue-head"></thead><tbody id="venue-body"></tbody></table></div>
</div>

<!-- TAB 6: Price Hunter -->
<div class="tab-panel" id="tab-6">
  <div class="filter-bar">
    <span class="filter-label">Max P50:</span>
    <span class="range-val" id="range-display">$5,000</span>
    <input type="range" id="price-range" min="500" max="20000" step="100" value="5000" oninput="renderPriceHunter()" style="width:220px;border:none">
    <span class="filter-count" id="hunter-count"></span>
  </div>
  <div class="card overflow"><table id="hunter-table"><thead id="hunter-head"></thead><tbody id="hunter-body"></tbody></table></div>
</div>

</div><!-- end #content -->

<script>
// ── Helpers ─────────────────────────────────────────────────────────────────

function getLatest(matchNum) {
  const snaps = PRICES[String(matchNum)];
  return snaps && snaps.length ? snaps[snaps.length - 1] : null;
}
function getSnap(matchNum, date) {
  const snaps = PRICES[String(matchNum)] || [];
  return snaps.find(s => s.date === date) || null;
}
function getSent(name) {
  if (!name) return 5;
  let best = 0;
  name.split(' vs ').forEach(p => { const s = SENTIMENTS[p.trim()]; if (s > best) best = s; });
  return best || 5;
}
function fmt$(n) {
  if (n == null || isNaN(n)) return '—';
  return '$' + Number(n).toLocaleString('en-US', {maximumFractionDigits: 0});
}
function fmtPct(n, plus) {
  if (n == null || isNaN(n)) return '—';
  return (plus && n > 0 ? '+' : '') + n.toFixed(1) + '%';
}
function sentClass(s) {
  return s >= 7 ? 'sent-hi' : s >= 5 ? 'sent-md' : 'sent-lo';
}
function updown(v) {
  if (v == null) return '<span class="flat">—</span>';
  if (v > 0.5) return '<span class="up">↑ +' + v.toFixed(1) + '%</span>';
  if (v < -0.5) return '<span class="down">↓ ' + v.toFixed(1) + '%</span>';
  return '<span class="flat">—</span>';
}
function badges(pos, gtx) {
  let h = '';
  if (pos) h += '<a href="' + pos + '" target="_blank" class="badge badge-pos" style="margin-right:4px">POS</a>';
  if (gtx) h += '<a href="' + gtx + '" target="_blank" class="badge badge-gtx">GoTix</a>';
  return h;
}
function getState(loc) {
  if (!loc) return 'Unknown';
  const p = loc.split(', ');
  return p.length >= 2 ? p[p.length - 2] : p[0];
}
function pctChange(matchNum, refDate) {
  const snaps = PRICES[String(matchNum)] || [];
  if (snaps.length < 2) return null;
  const latest = snaps[snaps.length - 1];
  const ref = snaps.find(s => s.date === refDate) || snaps[snaps.length - 2];
  if (!ref || !ref.p50 || !latest.p50) return null;
  return (latest.p50 - ref.p50) / ref.p50 * 100;
}

// ── Generic sortable table ────────────────────────────────────────────────────
// state: { key, asc }
const sortStates = {};

function makeHead(tableId, cols) {
  const st = sortStates[tableId] || {key: cols[0].key, asc: true};
  return cols.map(c => {
    const align = c.right ? ' r' : c.center ? ' c' : '';
    if (!c.key) return '<th class="' + align.trim() + '">' + c.label + '</th>';
    const active = st.key === c.key ? ' sort-active' : '';
    const arrow = st.key === c.key ? (st.asc ? ' ↑' : ' ↓') : ' <span style="opacity:.3">↕</span>';
    return '<th class="sortable' + active + align + '" onclick="doSort(\'' + tableId + '\',\'' + c.key + '\')">' + c.label + arrow + '</th>';
  }).join('');
}

function doSort(tableId, key) {
  const st = sortStates[tableId] || {key, asc: true};
  if (st.key === key) st.asc = !st.asc;
  else { st.key = key; st.asc = true; }
  sortStates[tableId] = st;
  // Re-render the appropriate tab
  const renders = {
    'events-table': renderAllEvents,
    'picks-table': renderHotPicks,
    'venue-table': renderVenueScout,
    'hunter-table': renderPriceHunter,
    'paths-table': renderTeamPaths,
    'movers-table': renderMoversTable,
    'port-inv-table': renderPortSummary,
    'port-sales-table': renderPortSales,
    'deepdive-table': renderDeepDive
  };
  if (renders[tableId]) renders[tableId]();
}

function sortRows(rows, tableId) {
  const st = sortStates[tableId];
  if (!st) return rows;
  return [...rows].sort((a, b) => {
    let av = a[st.key], bv = b[st.key];
    if (av == null) av = st.asc ? Infinity : -Infinity;
    if (bv == null) bv = st.asc ? Infinity : -Infinity;
    if (typeof av === 'string') return st.asc ? av.localeCompare(bv) : bv.localeCompare(av);
    return st.asc ? av - bv : bv - av;
  });
}

// ── Tab switching ─────────────────────────────────────────────────────────────
function showTab(i) {
  document.querySelectorAll('.tab-panel').forEach((el, idx) => el.classList.toggle('active', idx === i));
  document.querySelectorAll('.tab-btn').forEach((el, idx) => el.classList.toggle('active', idx === i));
}

// ── TAB 0: All Events ──────────────────────────────────────────────────────────
function renderAllEvents() {
  const search = (document.getElementById('events-search').value || '').toLowerCase();
  const cols = [
    {label:'#', key:'match'},
    {label:'Group', key:'group'},
    {label:'Event', key:'name'},
    {label:'Venue', key:'venue'},
    {label:'Date', key:'date'},
    {label:'Lead Days', key:'leadTimeDays', right:true},
    {label:'Floor', key:'pMin', right:true},
    {label:'P25', key:'p25', right:true},
    {label:'P50', key:'p50', right:true},
    {label:'SH Qty', key:'qty', right:true},
    {label:'V7D', key:'v7d', right:true},
    {label:'T7', key:'t7', right:true},
    {label:'Trend', key:'trendPct', center:true},
    {label:'Sent.', key:'sent', center:true},
    {label:'Links', key:null, center:true}
  ];
  const rows = EVENT_META.map(e => {
    const l = getLatest(e.match);
    const snaps = PRICES[String(e.match)] || [];
    let trendPct = null;
    if (snaps.length >= 2) {
      const c = snaps[snaps.length-1].p50, p = snaps[snaps.length-2].p50;
      if (c && p) trendPct = (c - p) / p * 100;
    }
    return {
      match: e.match, group: e.group || e.phase, name: e.name, venue: e.venue, date: e.date, leadTimeDays: e.leadTimeDays,
      pMin: l ? l.pMin : null, p25: l ? l.p25 : null, p50: l ? l.p50 : null,
      qty: l ? l.qty : null, v7d: l ? l.v7d : null, t7: l ? l.t7 : null,
      trendPct, sent: getSent(e.name), pos: e.pos, gotix: e.gotix
    };
  }).filter(r => !search || r.name.toLowerCase().includes(search) || r.venue.toLowerCase().includes(search));

  if (!sortStates['events-table']) sortStates['events-table'] = {key:'match', asc:true};
  const sorted = sortRows(rows, 'events-table');

  document.getElementById('events-head').innerHTML = '<tr>' + makeHead('events-table', cols) + '</tr>';
  document.getElementById('events-count').textContent = sorted.length + ' of ' + EVENT_META.length + ' events';
  document.getElementById('events-body').innerHTML = sorted.map(r => `
    <tr>
      <td class="muted">${r.match}</td>
      <td style="color:#475569">${r.group || '—'}</td>
      <td class="bold" style="max-width:200px">${r.name}</td>
      <td style="color:#475569;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.venue}</td>
      <td style="color:#475569">${r.date}</td>
      <td class="r">${r.leadTimeDays != null ? r.leadTimeDays : '—'}</td>
      <td class="r">${fmt$(r.pMin)}</td>
      <td class="r">${fmt$(r.p25)}</td>
      <td class="r bold">${fmt$(r.p50)}</td>
      <td class="r">${r.qty != null ? r.qty.toLocaleString() : '—'}</td>
      <td class="r">${r.v7d != null ? r.v7d.toLocaleString() : '—'}</td>
      <td class="r">${r.t7 || '—'}</td>
      <td class="c">${updown(r.trendPct)}</td>
      <td class="c ${sentClass(r.sent)}">${r.sent}</td>
      <td class="c" style="white-space:nowrap">${badges(r.pos, r.gotix)}</td>
    </tr>`).join('');
}

// ── TAB 1: Team Paths ─────────────────────────────────────────────────────────
let currentPathType = 'Group Stage';

function initTeamSelect() {
  const teams = [...new Set(EVENT_META.flatMap(e => [e.teamA, e.teamB]).filter(Boolean))].sort();
  const sel = document.getElementById('team-select');
  sel.innerHTML = teams.map(t => `<option value="${t}">${t}</option>`).join('');
  renderTeamPaths();
}

function renderTeamPaths() {
  const team = document.getElementById('team-select').value;
  const teamEvents = EVENT_META.filter(e => e.teamA === team || e.teamB === team);
  const group = teamEvents[0]?.group || '?';
  document.getElementById('team-group').textContent = 'Group ' + group;
  const pathKeys = ['Group Stage'];
  const btnsEl = document.getElementById('path-btns');
  btnsEl.innerHTML = pathKeys.map(k =>
    `<button class="path-btn${k===currentPathType?' active':''}" onclick="setPathType('${k}')">${k}</button>`
  ).join('');
  if (!pathKeys.includes(currentPathType)) currentPathType = 'Group Stage';

  const cols = [
    {label:'#', key:'match'},
    {label:'Group', key:'group'},
    {label:'Round / Description', key:'desc'},
    {label:'Venue', key:'venue'},
    {label:'Date', key:'date'},
    {label:'Est. Price', key:'priceNum', right:true},
    {label:'Links', key:null, center:true}
  ];
  if (!sortStates['paths-table']) sortStates['paths-table'] = {key:'match', asc:true};
  const raw = teamEvents.map(e => {
    const l = getLatest(e.match);
    return {
      match: e.match, group: e.group, desc: e.name, venue: e.venue, date: e.date,
      price: l ? l.p50 : null, priceNum: l ? l.p50 : null, pos: e.pos, gotix: e.gotix
    };
  });
  const sorted = sortRows(raw, 'paths-table');
  document.getElementById('paths-head').innerHTML = '<tr>' + makeHead('paths-table', cols) + '</tr>';
  document.getElementById('paths-body').innerHTML = sorted.map(r => `
    <tr>
      <td class="muted">${r.match}</td>
      <td style="color:#475569">${r.group || '—'}</td>
      <td class="bold">${r.desc || '—'}</td>
      <td style="color:#475569">${r.venue}</td>
      <td style="color:#475569">${r.date}</td>
      <td class="r bold">${r.priceNum ? fmt$(r.priceNum) : '—'}</td>
      <td class="c" style="white-space:nowrap">${badges(r.pos, r.gotix)}</td>
    </tr>`).join('');
}

function setPathType(type) {
  currentPathType = type;
  renderTeamPaths();
}

// ── TAB 2: Market Trends ───────────────────────────────────────────────────────
const REF_DATE = '2026-03-10'; // baseline for "since 3/10" analysis

function getPhase(eventName) {
  const nm = eventName.toLowerCase();
  if (nm.includes('round of 32')) return 'Round of 32';
  if (nm.includes('round of 16')) return 'Round of 16';
  if (nm.includes('quarterfinal')) return 'Quarterfinal';
  if (nm.includes('semifinal')) return 'Semifinal';
  if (nm.includes('final')) return 'Final';
  return 'Group Stage';
}

function getTeamNames(name) {
  const teams = name.split(' vs ').map(t => t.trim());
  return {teamA: teams[0] || '', teamB: teams[1] || ''};
}

const EVENT_META = EVENTS.map(e => ({
  ...e,
  phase: getPhase(e.name),
  ...getTeamNames(e.name)
}));

function computeMovers() {
  return EVENT_META.map(e => {
    const snaps = PRICES[String(e.match)] || [];
    if (snaps.length < 2) return null;
    const latest = snaps[snaps.length - 1];
    const ref = snaps.find(s => s.date === REF_DATE) || snaps[snaps.length - 2];
    if (!ref || !ref.p50 || !latest.p50) return null;
    const pct = (latest.p50 - ref.p50) / ref.p50 * 100;
    return {
      match: e.match, name: e.name, venue: e.venue,
      refP50: ref.p50, latestP50: latest.p50,
      absChange: latest.p50 - ref.p50, pctChange: pct,
      v7d: latest.v7d, qty: latest.qty,
      sent: getSent(e.name), pos: e.pos, gotix: e.gotix, group: e.group
    };
  }).filter(Boolean);
}

let _movers = null;
function getMovers() {
  if (!_movers) _movers = computeMovers();
  return _movers;
}

function renderTrendsOverview() {
  const movers = getMovers();
  const gainers = movers.filter(m => m.pctChange > 1).length;
  const decliners = movers.filter(m => m.pctChange < -1).length;
  const flat = movers.length - gainers - decliners;
  const avgRef = movers.reduce((s,m) => s + m.refP50, 0) / movers.length;
  const avgLat = movers.reduce((s,m) => s + m.latestP50, 0) / movers.length;
  const avgChg = avgLat - avgRef;
  const avgPct = avgChg / avgRef * 100;

  const topGainers = [...movers].sort((a,b) => b.pctChange - a.pctChange).slice(0, 8);
  const topDecliners = [...movers].sort((a,b) => a.pctChange - b.pctChange).slice(0, 8);

  const statsHTML = `
    <div class="stat-grid">
      <div class="stat ${avgChg < 0 ? 'red' : 'green'}">
        <div class="stat-lbl">Avg Market P50</div>
        <div class="stat-val">${fmt$(avgLat)}</div>
        <div class="stat-sub" style="color:${avgChg<0?'#dc2626':'#16a34a'};font-weight:600">${avgChg<0?'↓ ':'↑ +'}${fmt$(Math.abs(avgChg))} (${fmtPct(avgPct, true)}) vs Feb 19</div>
      </div>
      <div class="stat green"><div class="stat-lbl">Gainers</div><div class="stat-val" style="color:#16a34a">${gainers}</div><div class="stat-sub">up &gt;1%</div></div>
      <div class="stat red"><div class="stat-lbl">Decliners</div><div class="stat-val" style="color:#dc2626">${decliners}</div><div class="stat-sub">down &gt;1%</div></div>
      <div class="stat"><div class="stat-lbl">Flat</div><div class="stat-val" style="color:#94a3b8">${flat}</div><div class="stat-sub">within ±1%</div></div>
    </div>`;

  const gainTable = topGainers.map(m => `
    <tr>
      <td class="muted">${m.match}</td>
      <td style="color:#475569">${m.group || '—'}</td>
      <td class="bold" style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.name}</td>
      <td class="r">${fmt$(m.refP50)}</td>
      <td class="r bold">${fmt$(m.latestP50)}</td>
      <td class="r up">+${m.pctChange.toFixed(1)}%</td>
    </tr>`).join('');

  const declTable = topDecliners.map(m => `
    <tr>

function renderDeepDive() {
  const matchNum = document.getElementById('deepdive-select').value;
  const snaps = PRICES[String(matchNum)] || [];
  const ev = EVENT_META.find(e => String(e.match) === String(matchNum));
  if (!snaps.length) { document.getElementById('deepdive-content').innerHTML = '<p style="padding:20px;color:#94a3b8">No data.</p>'; return; }

  const first = snaps[0], last = snaps[snaps.length - 1];
  const totalPct = first.p50 && last.p50 ? (last.p50 - first.p50) / first.p50 * 100 : null;

  // Mini bar chart for P50
  const p50vals = snaps.map(s => s.p50 || 0);
  const maxP50 = Math.max(...p50vals, 1);
  const p50bars = snaps.map((s, i) => {
    const h = Math.round(p50vals[i] / maxP50 * 100);
    const lbl = s.date.replace('2026-','').replace('2025-','');
    return `<div class="bar-col" title="${s.date}: ${fmt$(s.p50)}"><div class="bar-fill" style="height:${h}%;background:#3b82f6"></div><div class="bar-date">${lbl}</div></div>`;
  }).join('');

  // V7D bars
  const v7dvals = snaps.map(s => s.v7d || 0);
  const maxV7D = Math.max(...v7dvals, 1);
  const v7dbars = snaps.map((s, i) => {
    const h = Math.round(v7dvals[i] / maxV7D * 100);
    const lbl = s.date.replace('2026-','').replace('2025-','');
    return `<div class="bar-col" title="${s.date}: ${(s.v7d||0).toLocaleString()}"><div class="bar-fill" style="height:${h}%;background:#8b5cf6"></div><div class="bar-date">${lbl}</div></div>`;
  }).join('');

  const cols = [
    {label:'Date', key:'date'},
    {label:'Floor', key:'pMin', right:true},
    {label:'P25', key:'p25', right:true},
    {label:'P50', key:'p50', right:true},
    {label:'SH Qty', key:'qty', right:true},
    {label:'V7D', key:'v7d', right:true},
    {label:'T7', key:'t7', right:true},
    {label:'P50 Δ', key:'deltaPct', right:true}
  ];
  const snapRows = snaps.map((s, i) => {
    const prev = i > 0 ? snaps[i-1] : null;
    const delta = prev && prev.p50 && s.p50 ? (s.p50 - prev.p50) / prev.p50 * 100 : null;
    return {...s, deltaPct: delta};
  });
  if (!sortStates['deepdive-table']) sortStates['deepdive-table'] = {key:'date', asc:true};
  const sortedSnaps = sortRows(snapRows, 'deepdive-table');

  document.getElementById('deepdive-content').innerHTML = `
    <div class="stat-grid" style="margin-bottom:14px">
      <div class="stat"><div class="stat-lbl">Latest P50</div><div class="stat-val">${fmt$(last.p50)}</div><div class="stat-sub">${last.date}</div></div>
      <div class="stat"><div class="stat-lbl">Floor</div><div class="stat-val">${fmt$(last.pMin)}</div></div>
      <div class="stat"><div class="stat-lbl">SH Qty</div><div class="stat-val">${last.qty ? last.qty.toLocaleString() : '—'}</div></div>
      <div class="stat"><div class="stat-lbl">V7D</div><div class="stat-val">${last.v7d ? last.v7d.toLocaleString() : '—'}</div></div>
      ${totalPct !== null ? `<div class="stat ${totalPct<0?'red':'green'}"><div class="stat-lbl">All-Time P50 Chg</div><div class="stat-val" style="color:${totalPct<0?'#dc2626':'#16a34a'}">${fmtPct(totalPct, true)}</div><div class="stat-sub">${first.date.replace('2026-','').replace('2025-','')} → ${last.date.replace('2026-','')}</div></div>` : ''}
    </div>
    <div class="two-col" style="margin-bottom:14px">
      <div class="card card-pad"><div class="section-title">P50 Over Time</div><div class="bar-chart">${p50bars}</div></div>
      <div class="card card-pad"><div class="section-title">Views (7D) Over Time</div><div class="bar-chart">${v7dbars}</div></div>
    </div>
    <div class="card overflow">
      <table>
        <thead><tr>${makeHead('deepdive-table', cols)}</tr></thead>
        <tbody>${sortedSnaps.map(s => `
          <tr>
            <td class="bold">${s.date}</td>
            <td class="r">${fmt$(s.pMin)}</td>
            <td class="r">${fmt$(s.p25)}</td>
            <td class="r bold">${fmt$(s.p50)}</td>
            <td class="r">${s.qty ? s.qty.toLocaleString() : '—'}</td>
            <td class="r">${s.v7d ? s.v7d.toLocaleString() : '—'}</td>
            <td class="r">${s.t7 || '—'}</td>
            <td class="r ${s.deltaPct == null ? '' : s.deltaPct > 0 ? 'up' : s.deltaPct < 0 ? 'down' : 'flat'}">${s.deltaPct != null ? fmtPct(s.deltaPct, true) : '—'}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

function renderHotPicks() {
  const avgV7D = EVENT_META.reduce((s,e) => { const l=getLatest(e.match); return s+(l?l.v7d:0); }, 0) / EVENT_META.length;
  const picks = EVENT_META.map(e => {
    const l = getLatest(e.match);
    if (!l) return null;
    const sent = getSent(e.name);
    const momentum = pctChange(e.match, REF_DATE);
    const spread = l.p50 - l.pMin;
    const spreadPct = spread / Math.max(l.pMin, 1) * 100;
    const score = ((sent/10) * (l.v7d / Math.max(avgV7D,1)) * (spreadPct/100 + 0.5));
    return { match: e.match, name: e.name, venue: e.venue, sent, p50: l.p50, pMin: l.pMin, v7d: l.v7d, spreadPct, momentum, score, pos: e.pos, gotix: e.gotix, group: e.group };
  }).filter(Boolean);

  const cols = [
    {label:'#', key:'match'},
    {label:'Group', key:'group'},
    {label:'Event', key:'name'},
    {label:'Venue', key:'venue'},
    {label:'Sent.', key:'sent', center:true},
    {label:'Floor', key:'pMin', right:true},
    {label:'P50', key:'p50', right:true},
    {label:'Spread%', key:'spreadPct', right:true},
    {label:'Momentum', key:'momentum', right:true},
    {label:'V7D', key:'v7d', right:true},
    {label:'Score', key:'score', right:true},
    {label:'Links', key:null, center:true}
  ];
  if (!sortStates['picks-table']) sortStates['picks-table'] = {key:'score', asc:false};
  const sorted = sortRows(picks, 'picks-table');
  document.getElementById('picks-head').innerHTML = '<tr>' + makeHead('picks-table', cols) + '</tr>';
  document.getElementById('picks-body').innerHTML = sorted.map(p => `
    <tr>
      <td class="muted">${p.match}</td>
      <td style="color:#475569">${p.group || '—'}</td>
      <td class="bold" style="max-width:180px">${p.name}</td>
      <td style="color:#475569">${p.venue}</td>
      <td class="c ${sentClass(p.sent)}">${p.sent}</td>
      <td class="r">${fmt$(p.pMin)}</td>
      <td class="r bold">${fmt$(p.p50)}</td>
      <td class="r">${p.spreadPct.toFixed(1)}%</td>
      <td class="r ${p.momentum>1?'up':p.momentum<-1?'down':'flat'}">${p.momentum!=null?fmtPct(p.momentum,true):'—'}</td>
      <td class="r">${p.v7d ? p.v7d.toLocaleString() : '—'}</td>
      <td class="r bold" style="color:#1e40af">${p.score.toFixed(2)}</td>
      <td class="c" style="white-space:nowrap">${badges(p.pos, p.gotix)}</td>
    </tr>`).join('');
}
