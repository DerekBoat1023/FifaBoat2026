        const SENTIMENTS = {"Canada": 10, "Mexico": 10, "USMNT": 10, "Spain": 10, "Argentina": 10, "France": 10, "England": 10, "Brazil": 10, "Portugal": 10, "Netherlands": 7, "Belgium": 7, "Germany": 10, "Croatia": 8, "Morocco": 6, "Colombia": 8, "Uruguay": 8, "Switzerland": 7, "Japan": 6, "Senegal": 3, "Iran": 3, "South Korea": 6, "Ecuador": 7, "Austria": 7, "Australia": 8, "Norway": 9, "Panama": 6, "Egypt": 5, "Algeria": 5, "Scotland": 8, "Paraguay": 5, "Tunisia": 4, "Ivory Coast": 3, "Uzbekistan": 3, "Qatar": 4, "Saudi Arabia": 5, "South Africa": 5, "Jordan": 3, "Cape Verde": 3, "Ghana": 3, "Cura\u00c3\u00a7ao": 2, "Haiti": 3, "New Zealand": 6, "Uefa Play-off A": 6, "Uefa Play-off B": 6, "Uefa Play-off C": 3, "Uefa Play-off D": 6, "Fifa Play-off 1": 2, "Fifa Play-off 2": 2};
        const GROUPS = {"Group A": ["Mexico", "South Africa", "Republic of Korea", "UEFA Play-off D winner"], "Group B": ["Canada", "UEFA Play-off A winner", "Qatar", "Switzerland"], "Group C": ["Brazil", "Morocco", "Haiti", "Scotland"], "Group D": ["USA", "Paraguay", "Australia", "UEFA Play-off C winner"], "Group E": ["Germany", "Curacao", "C\u00c3\u00b4te d\u00e2\u0080\u0099Ivoire", "Ecuador"], "Group F": ["Netherlands", "Japan", "UEFA Play-off B winner", "Tunisia"], "Group G": ["Belgium", "Egypt", "Islamic Republic of Iran", "New Zealand"], "Group H": ["Spain", "Cabo Verde", "Saudi Arabia", "Uruguay"], "Group I": ["France", "Senegal", "FIFA Play-off 2 winner", "Norway"], "Group J": ["Argentina", "Algeria", "Austria", "Jordan"], "Group K": ["Portugal", "FIFA Play-off 1 winner", "Uzbekistan", "Colombia"], "Group L": ["England", "Croatia", "Ghana", "Panama"]};
        const ALL_TEAMS = ["Algeria", "Argentina", "Australia", "Austria", "Belgium", "Brazil", "Cabo Verde", "Canada", "Colombia", "Croatia", "Curacao", "Ecuador", "Egypt", "England", "France", "Germany", "Ghana", "Haiti", "IC Winner 1", "IC Winner 2", "Iran", "Ivory Coast", "Japan", "Jordan", "Korea Republic", "Mexico", "Morocco", "Netherlands", "New Zealand", "Norway", "Panama", "Paraguay", "Portugal", "Qatar", "Saudi Arabia", "Scotland", "Senegal", "South Africa", "Spain", "Switzerland", "Tunisia", "UEFA Playoff A", "UEFA Playoff B", "UEFA Playoff C", "UEFA Playoff D", "USA", "Uruguay", "Uzbekistan"];
        const ALL_VENUES = ["Arlington", "Atlanta", "Ciudad de M\u00e9xico", "East Rutherford", "Foxborough", "Houston", "Inglewood", "Kansas City", "Miami", "Monterrey", "Philadelphia", "Santa Clara", "Seattle", "Toronto", "Vancouver", "Zapopan"];
    </script>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useCallback, useRef } = React;

        function App() {
            const [activeTab, setActiveTab] = useState('all-events');
            const [selectedTeam, setSelectedTeam] = useState(ALL_TEAMS[0] || '');
            const [selectedVenue, setSelectedVenue] = useState('');
            const [maxP50, setMaxP50] = useState(10000);
            const [sortConfig, setSortConfig] = useState({ key: 'match_num', direction: 'asc' });

            const eventsList = useMemo(() => {
                return Object.values(RAW_EVENTS).map(e => ({
                    ...e,
                    match_num: parseInt(e.match_num)
                })).sort((a, b) => a.match_num - b.match_num);
            }, []);

            const filteredEvents = useMemo(() => {
                let result = eventsList;

                if (activeTab === 'venue-scout' && selectedVenue) {
                    result = result.filter(e => {
                        const city = e.location ? e.location.split(',')[0].trim() : '';
                        return city === selectedVenue;
                    });
                } else if (activeTab === 'price-hunter') {
                    result = result.filter(e => (e.price_p50 || 0) <= maxP50);
                } else if (activeTab === 'team-path') {
                    return [];
                }

                return sortEvents(result, sortConfig);
            }, [eventsList, activeTab, selectedVenue, maxP50, sortConfig]);

            const teamPathEvents = useMemo(() => {
                if (!selectedTeam || !TEAM_PATHS[selectedTeam]) return [];
                const paths = TEAM_PATHS[selectedTeam];
                const result = paths.map(p => {
                    const match = p.match;
                    const discovered = eventsList.find(e =>
                        e.event_name && match && e.event_name.includes(match.split('(')[0].trim())
                    );
                    return {
                        ...p,
                        price_p50: discovered ? (discovered.price_p50 || 0) : 0,
                        ticket_qty: discovered ? (discovered.ticket_qty || 0) : 0,
                        visits_l7d: discovered ? (discovered.visits_l7d || 0) : 0,
                        trans_l7d: discovered ? (discovered.trans_l7d || 0) : 0,
                    };
                });
                return result;
            }, [selectedTeam, eventsList]);

            const pathTypes = useMemo(() => {
                const types = {};
                teamPathEvents.forEach(p => {
                    if (!types[p.path_type]) types[p.path_type] = [];
                    types[p.path_type].push(p);
                });
                return types;
            }, [teamPathEvents]);

            const statCards = useMemo(() => {
                const events = activeTab === 'team-path' ? teamPathEvents : filteredEvents;
                const avgP50 = events.length > 0
                    ? Math.round(events.reduce((sum, e) => sum + (e.price_p50 || 0), 0) / events.length)
                    : 0;
                const totalQty = events.reduce((sum, e) => sum + (e.ticket_qty || 0), 0);
                const totalVisits = events.reduce((sum, e) => sum + (e.visits_l7d || 0), 0);

                return [
                    { label: 'Matches Showing', value: events.length },
                    { label: 'Avg P50', value: '$' + avgP50.toLocaleString() },
                    { label: 'Total SH Qty', value: totalQty.toLocaleString() },
                    { label: 'Total 7D Visits', value: totalVisits.toLocaleString() }
                ];
            }, [activeTab, filteredEvents, teamPathEvents]);

            const handleSort = useCallback((key) => {
                setSortConfig(prev => ({
                    key,
                    direction: prev.key === key && prev.direction === 'asc' ? 'desc' : 'asc'
                }));
            }, []);

            const handleCSVUpload = useCallback((e) => {
                const file = e.target.files?.[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const csv = event.target?.result;
                            alert('CSV loaded: ' + file.name + ' (' + csv.length + ' bytes)');
                        } catch (err) {
                            alert('Error loading CSV');
                        }
                    };
                    reader.readAsText(file);
                }
            }, []);

            return (
                <div className="max-w-7xl mx-auto">
                    <div className="mb-8">
                        <h1 className="text-5xl font-bold gradient-title mb-2">FIFA 2026 Sales Hub</h1>
                        <p className="text-gray-400">World Cup Secondary Market Price Tracker</p>
                    </div>

                    <div className="mb-6 flex gap-2 flex-wrap items-center">
                        <div className="flex border-b border-gray-700">
                            {[
                                { id: 'all-events', label: 'All Events' },
                                { id: 'team-path', label: 'Team Path Tracker' },
                                { id: 'venue-scout', label: 'Venue Scout' },
                                { id: 'price-hunter', label: 'Price Hunter' }
                            ].map(tab => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={'px-4 py-2 text-sm font-medium transition ' + (activeTab === tab.id ? 'tab-active text-cyan-400' : 'text-gray-400 hover:text-gray-300')}
                                >
                                    {tab.label}
                                </button>
                            ))}
                        </div>
                        <label className="flex items-center gap-2 px-4 py-2 bg-cyan-600 hover:bg-cyan-700 text-white rounded cursor-pointer text-sm">
                            <span>Upload CSV</span>
                            <input type="file" accept=".csv" onChange={handleCSVUpload} className="hidden" />
                        </label>
                    </div>

                    {activeTab === 'team-path' && (
                        <div className="mb-6">
                            <label className="block text-sm font-medium mb-2">Select Team:</label>
                            <select
                                value={selectedTeam}
                                onChange={(e) => setSelectedTeam(e.target.value)}
                                className="w-full bg-gray-800 border border-gray-700 rounded px-4 py-2 text-white"
                            >
                                {ALL_TEAMS.map(team => (
                                    <option key={team} value={team}>{team}</option>
                                ))}
                            </select>
                            {selectedTeam && SENTIMENTS[selectedTeam] && (
                                <div className="mt-3 p-4 card-dark rounded">
                                    <div className="text-lg font-semibold">
                                        {selectedTeam} Sentiment Score:
                                        <span className={'ml-2 font-bold ' + (SENTIMENTS[selectedTeam] >= 9 ? 'sentiment-9-10' : SENTIMENTS[selectedTeam] >= 7 ? 'sentiment-7-8' : 'sentiment-low')}>
                                            {SENTIMENTS[selectedTeam]}/10
                                        </span>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {activeTab === 'venue-scout' && (
                        <div className="mb-6">
                            <label className="block text-sm font-medium mb-2">Select City:</label>
                            <select
                                value={selectedVenue}
                                onChange={(e) => setSelectedVenue(e.target.value)}
                                className="w-full bg-gray-800 border border-gray-700 rounded px-4 py-2 text-white"
                            >
                                <option value="">All Cities</option>
                                {ALL_VENUES.map(venue => (
                                    <option key={venue} value={venue}>{venue}</option>
                                ))}
                            </select>
                        </div>
                    )}

                    {activeTab === 'price-hunter' && (
                        <div className="mb-6 p-4 card-dark rounded">
                            <label className="block text-sm font-medium mb-3">Max P50 Price: <span className="text-amber-400 font-bold">${(maxP50).toLocaleString()}</span></label>
                            <input
                                type="range"
                                min="0"
                                max="15000"
                                step="100"
                                value={maxP50}
                                onChange={(e) => setMaxP50(parseInt(e.target.value))}
                                className="w-full"
                            />
                        </div>
                    )}

                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                        {statCards.map((card, i) => (
                            <div key={i} className="card-dark rounded p-4 text-center">
                                <div className="text-sm text-gray-400 mb-1">{card.label}</div>
                                <div className="text-2xl font-bold text-cyan-400">{card.value}</div>
                            </div>
                        ))}
                    </div>

                    {activeTab === 'team-path' ? (
                        <div>
                            {Object.entries(pathTypes).map(([pathType, paths]) => (
                                <div key={pathType} className="mb-8">
                                    <h2 className="text-xl font-bold mb-4 p-3 rounded" style={{backgroundColor:
                                        pathType === 'Group Stage' ? 'rgba(6, 182, 212, 0.2)' :
                                        pathType === 'If 1st in Group' ? 'rgba(245, 158, 11, 0.2)' :
                                        'rgba(168, 85, 247, 0.2)'
                                    }}>
                                        {pathType}
                                    </h2>
                                    <div className="card-dark rounded overflow-x-auto">
                                        <EventsTable
                                            events={paths}
                                            sortConfig={sortConfig}
                                            onSort={handleSort}
                                            isTeamPath={true}
                                        />
                                    </div>
                                </div>
                            ))}
                        </div>
                    ) : (
                        <div className="card-dark rounded overflow-x-auto">
                            <EventsTable
                                events={filteredEvents}
                                sortConfig={sortConfig}
                                onSort={handleSort}
                            />
                        </div>
                    )}
                </div>
            );
        }

        function EventsTable({ events, sortConfig, onSort, isTeamPath = false }) {
            const getTeamSentiment = (eventName) => {
                const parts = eventName.split(' vs ');
                if (parts.length === 2) {
                    const team1 = parts[0].trim();
                    const team2 = parts[1].trim();
                    return Math.max(SENTIMENTS[team1] || 0, SENTIMENTS[team2] || 0);
                }
                return 0;
            };

            const getSentimentClass = (score) => {
                if (score >= 9) return 'sentiment-9-10';
                if (score >= 7) return 'sentiment-7-8';
                return 'sentiment-low';
            };

            const formatCurrency = (value) => {
                return '$' + (value || 0).toLocaleString('en-US', { maximumFractionDigits: 0 });
            };

            const SortHeader = ({ label, sortKey }) => (
                <th onClick={() => onSort(sortKey)} className="whitespace-nowrap">
                    {label} {sortConfig.key === sortKey && (sortConfig.direction === 'asc' ? '▲' : '▼')}
                </th>
            );

            return (
                <table>
                    <thead>
                        <tr>
                            <SortHeader label="#" sortKey="match_num" />
                            <SortHeader label="Event" sortKey="event_name" />
                            <SortHeader label="Venue" sortKey="venue" />
                            <SortHeader label="Date" sortKey="date" />
                            <SortHeader label="Floor" sortKey="price_min" />
                            <SortHeader label="P25" sortKey="price_p25" />
                            <SortHeader label="P50" sortKey="price_p50" />
                            <SortHeader label="SH Qty" sortKey="ticket_qty" />
                            <SortHeader label="Visits 7D" sortKey="visits_l7d" />
                            <SortHeader label="Trans 7D" sortKey="trans_l7d" />
                            <SortHeader label="Sentiment" sortKey="match_num" />
                            <th>Links</th>
                        </tr>
                    </thead>
                    <tbody>
                        {events.map((event, idx) => {
                            const sentiment = isTeamPath ? 0 : getTeamSentiment(event.event_name || '');
                            return (
                                <tr key={idx}>
                                    <td className="whitespace-nowrap">{event.match_num || event.match || ''}</td>
                                    <td className="whitespace-nowrap text-sm">{event.event_name || event.event_description || ''}</td>
                                    <td className="whitespace-nowrap text-sm">{event.venue || ''}</td>
                                    <td className="whitespace-nowrap text-sm">{event.date || ''}</td>
                                    <td className="whitespace-nowrap price-min">{formatCurrency(event.price_min || event.get_in_price || 0)}</td>
                                    <td className="whitespace-nowrap price-p25">{formatCurrency(event.price_p25 || 0)}</td>
                                    <td className="whitespace-nowrap price-p50">{formatCurrency(event.price_p50 || 0)}</td>
                                    <td className="whitespace-nowrap">{(event.ticket_qty || 0).toLocaleString()}</td>
                                    <td className="whitespace-nowrap">{(event.visits_l7d || 0).toLocaleString()}</td>
                                    <td className="whitespace-nowrap">{(event.trans_l7d || 0).toLocaleString()}</td>
                                    <td className="whitespace-nowrap">
                                        {sentiment > 0 ? (
                                            <span className={getSentimentClass(sentiment)}>{sentiment}/10</span>
                                        ) : '-'}
                                    </td>
                                    <td className="whitespace-nowrap">
                                        <div className="flex gap-2">
                                            {event.pos_link && (
                                                <a href={event.pos_link} target="_blank" rel="noopener noreferrer"
                                                   className="btn-pos text-white px-2 py-1 rounded text-xs font-medium">
                                                    POS
                                                </a>
                                            )}
                                            {event.gotickets_link && (
                                                <a href={event.gotickets_link} target="_blank" rel="noopener noreferrer"
                                                   className="btn-gotickets text-white px-2 py-1 rounded text-xs font-medium">
                                                    GoTix
                                                </a>
                                            )}
                                        </div>
                                    </td>
                                </tr>
                            );
                        })}
                    </tbody>
                </table>
            );
        }

        function sortEvents(events, config) {
            const sorted = [...events].sort((a, b) => {
                let aVal = a[config.key];
                let bVal = b[config.key];

                if (typeof aVal === 'string') aVal = aVal.toLowerCase();
                if (typeof bVal === 'string') bVal = bVal.toLowerCase();

                if (aVal < bVal) return config.direction === 'asc' ? -1 : 1;
                if (aVal > bVal) return config.direction === 'asc' ? 1 : -1;
                return 0;
            });
            return sorted;
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
